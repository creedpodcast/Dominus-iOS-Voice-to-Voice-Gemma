<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone AI App — Architecture Chart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f4f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #73726c;
    margin-bottom: 1.5rem;
  }
  .card {
    background: #ffffff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 16px;
    padding: 1.5rem;
    width: 100%;
    max-width: 760px;
  }
  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }

  /* c-teal */
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }
  /* c-purple */
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  /* c-coral */
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }
  /* c-blue */
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }
  /* c-gray */
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }
  /* c-green */
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green .th { fill: #27500A; }
  .c-green .ts { fill: #3B6D11; }
  /* c-amber */
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  .node { cursor: pointer; }
  .node:hover rect { opacity: 0.85; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 1rem;
    font-size: 12px;
    color: #73726c;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; }
</style>
</head>
<body>

<h1>iPhone AI App — Architecture</h1>
<p class="subtitle">iPhone 13 Pro Max · On-device · ~2.4GB total footprint</p>

<div class="card">
<svg width="100%" viewBox="0 0 680 720" role="img">
<title>iPhone AI app architecture diagram</title>
<desc>Layered architecture chart showing the full stack for an on-device iPhone AI app.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer labels -->
<text class="ts" x="28" y="82"  text-anchor="middle" transform="rotate(-90,28,82)">Input</text>
<text class="ts" x="28" y="210" text-anchor="middle" transform="rotate(-90,28,210)">Speech</text>
<text class="ts" x="28" y="350" text-anchor="middle" transform="rotate(-90,28,350)">Inference</text>
<text class="ts" x="28" y="470" text-anchor="middle" transform="rotate(-90,28,470)">Memory</text>
<text class="ts" x="28" y="590" text-anchor="middle" transform="rotate(-90,28,590)">Storage</text>
<text class="ts" x="28" y="685" text-anchor="middle" transform="rotate(-90,28,685)">Files</text>

<!-- Dividers -->
<line x1="48" y1="122" x2="648" y2="122" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="48" y1="268" x2="648" y2="268" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="48" y1="390" x2="648" y2="390" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="48" y1="510" x2="648" y2="510" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="48" y1="640" x2="648" y2="640" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>

<!-- INPUT ROW -->
<g class="node c-teal">
  <rect x="96" y="44" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="161" y="67" text-anchor="middle" dominant-baseline="central">Microphone</text>
  <text class="ts" x="161" y="85" text-anchor="middle" dominant-baseline="central">Raw audio input</text>
</g>
<g class="node c-teal">
  <rect x="274" y="44" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="339" y="67" text-anchor="middle" dominant-baseline="central">Text input</text>
  <text class="ts" x="339" y="85" text-anchor="middle" dominant-baseline="central">Keyboard / SwiftUI</text>
</g>
<g class="node c-teal">
  <rect x="452" y="44" width="148" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="526" y="67" text-anchor="middle" dominant-baseline="central">File picker</text>
  <text class="ts" x="526" y="85" text-anchor="middle" dominant-baseline="central">iOS share sheet</text>
</g>

<!-- SPEECH ROW -->
<g class="node c-purple">
  <rect x="60" y="140" width="155" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="137" y="163" text-anchor="middle" dominant-baseline="central">Silero VAD tiny</text>
  <text class="ts" x="137" y="181" text-anchor="middle" dominant-baseline="central">Silence detection · ~2MB</text>
</g>
<g class="node c-purple">
  <rect x="255" y="140" width="155" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="332" y="163" text-anchor="middle" dominant-baseline="central">WhisperKit</text>
  <text class="ts" x="332" y="181" text-anchor="middle" dominant-baseline="central">STT · ~70–600MB</text>
</g>
<g class="node c-gray">
  <rect x="450" y="140" width="165" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="532" y="163" text-anchor="middle" dominant-baseline="central">AVSpeechSynth</text>
  <text class="ts" x="532" y="181" text-anchor="middle" dominant-baseline="central">TTS · system · 0MB</text>
</g>

<!-- INFERENCE ROW -->
<g class="node c-coral">
  <rect x="60" y="288" width="230" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="175" y="311" text-anchor="middle" dominant-baseline="central">gemma-2-2b-it Q4_K_M</text>
  <text class="ts" x="175" y="329" text-anchor="middle" dominant-baseline="central">Core LLM · ~1.6GB · llama.cpp</text>
</g>
<g class="node c-gray">
  <rect x="330" y="288" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="420" y="311" text-anchor="middle" dominant-baseline="central">Context builder</text>
  <text class="ts" x="420" y="329" text-anchor="middle" dominant-baseline="central">Assembles system prompt</text>
</g>

<!-- MEMORY ROW -->
<g class="node c-blue">
  <rect x="60" y="408" width="168" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="144" y="431" text-anchor="middle" dominant-baseline="central">Memory blocks</text>
  <text class="ts" x="144" y="449" text-anchor="middle" dominant-baseline="central">User-written · ~0MB</text>
</g>
<g class="node c-blue">
  <rect x="268" y="408" width="155" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="345" y="431" text-anchor="middle" dominant-baseline="central">NLEmbedding RAG</text>
  <text class="ts" x="345" y="449" text-anchor="middle" dominant-baseline="central">Semantic search · ~52MB</text>
</g>
<g class="node c-blue">
  <rect x="463" y="408" width="155" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="540" y="431" text-anchor="middle" dominant-baseline="central">Project folders</text>
  <text class="ts" x="540" y="449" text-anchor="middle" dominant-baseline="central">Per-project prompt + files</text>
</g>

<!-- STORAGE ROW -->
<g class="node c-gray">
  <rect x="155" y="528" width="360" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="335" y="551" text-anchor="middle" dominant-baseline="central">SQLite</text>
  <text class="ts" x="335" y="569" text-anchor="middle" dominant-baseline="central">Memories · projects · file refs · chat history · ~5–20MB</text>
</g>

<!-- FILES ROW -->
<g class="node c-green">
  <rect x="52" y="656" width="100" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="102" y="679" text-anchor="middle" dominant-baseline="central">Text/CSV</text>
</g>
<g class="node c-green">
  <rect x="164" y="656" width="90" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="209" y="679" text-anchor="middle" dominant-baseline="central">PDFKit</text>
</g>
<g class="node c-green">
  <rect x="266" y="656" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="321" y="679" text-anchor="middle" dominant-baseline="central">Vision OCR</text>
</g>
<g class="node c-green">
  <rect x="388" y="656" width="116" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="446" y="679" text-anchor="middle" dominant-baseline="central">Audio/Whisper</text>
</g>
<g class="node c-amber">
  <rect x="516" y="656" width="112" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="572" y="672" text-anchor="middle" dominant-baseline="central">docx/xlsx</text>
  <text class="ts" x="572" y="689" text-anchor="middle" dominant-baseline="central">optional</text>
</g>

<!-- ARROWS -->
<path d="M161 100 L137 140" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="215" y1="168" x2="255" y2="168" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M339 100 L339 140 M339 196 L420 288" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M332 196 L260 288" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="330" y1="316" x2="290" y2="316" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M228 436 L330 340" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M345 408 L390 344" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M463 436 L510 344" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M144 464 L240 528" fill="none" stroke="#bbb" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M345 464 L335 528" fill="none" stroke="#bbb" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M540 464 L430 528" fill="none" stroke="#bbb" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="335" y1="584" x2="335" y2="656" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<path d="M526 100 L540 408" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<path d="M290 316 L532 316 L532 268" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
</svg>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#E1F5EE;border:1px solid #0F6E56"></div>Input</div>
  <div class="leg-item"><div class="leg-dot" style="background:#EEEDFE;border:1px solid #534AB7"></div>Speech</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FAECE7;border:1px solid #993C1D"></div>Inference (LLM)</div>
  <div class="leg-item"><div class="leg-dot" style="background:#E6F1FB;border:1px solid #185FA5"></div>Memory</div>
  <div class="leg-item"><div class="leg-dot" style="background:#F1EFE8;border:1px solid #5F5E5A"></div>System / neutral</div>
  <div class="leg-item"><div class="leg-dot" style="background:#EAF3DE;border:1px solid #3B6D11"></div>File reading</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FAEEDA;border:1px solid #854F0B"></div>Optional</div>
</div>
</div>

</div>
</body>
</html>
